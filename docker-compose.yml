services:
  aias-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aias-platform
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      PORT: 5000
      REDIS_URL: redis://aias-redis:6379/0
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      aias-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aias-network

  aias-redis:
    image: redis:7-alpine
    container_name: aias-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - aias-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aias-network

volumes:
  aias-redis-data:

networks:
  aias-network:
    driver: bridge
