services:
  aias-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aias-platform
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    volumes:
      # Persist SQLite database outside the container
      - aias-db:/app/database
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  aias-db:
    driver: local
